name: LSP Integration Tests

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"

jobs:
  lsp-tests:
    name: LSP Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm global packages
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-lsp-${{ hashFiles('.github/workflows/lsp_tests.yml') }}
          restore-keys: |
            ${{ runner.os }}-npm-lsp-

      - name: Install language servers
        run: |
          npm install -g pyright
          npm install -g typescript-language-server typescript

      - name: Install nerdvana-cli dev deps
        run: pip install -e ".[dev]"

      - name: Run base tests (excluding LSP integration)
        run: pytest tests/ -q -m "not lsp_integration"

      - name: Run LSP integration tests
        run: pytest tests/ -v -m "lsp_integration" --junit-xml=pytest-report.xml

      - name: Upload pytest report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: pytest-report.xml
          retention-days: 7

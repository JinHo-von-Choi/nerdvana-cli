name: Live Smoke

on:
  schedule:
    # daily 19:00 UTC (KST 04:00)
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  live-smoke:
    name: Live Smoke (py3.12)
    runs-on: ubuntu-22.04
    environment: live-smoke
    timeout-minutes: 15
    env:
      UV_SYSTEM_PYTHON: "1"
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
      XAI_API_KEY:         ${{ secrets.XAI_API_KEY }}
      OLLAMA_API_KEY:      ${{ secrets.OLLAMA_API_KEY }}
      VLLM_API_KEY:        ${{ secrets.VLLM_API_KEY }}
      DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
      MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
      CO_API_KEY:          ${{ secrets.CO_API_KEY }}
      TOGETHER_API_KEY:    ${{ secrets.TOGETHER_API_KEY }}
      ZHIPUAI_API_KEY:     ${{ secrets.ZHIPUAI_API_KEY }}
      FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
      MIMO_API_KEY:        ${{ secrets.MIMO_API_KEY }}
      MOONSHOT_API_KEY:    ${{ secrets.MOONSHOT_API_KEY }}
      DASHSCOPE_API_KEY:   ${{ secrets.DASHSCOPE_API_KEY }}
      MINIMAX_API_KEY:     ${{ secrets.MINIMAX_API_KEY }}
      PERPLEXITY_API_KEY:  ${{ secrets.PERPLEXITY_API_KEY }}
      FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
      CEREBRAS_API_KEY:    ${{ secrets.CEREBRAS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --extra dev --extra mcp
      - name: Run live smoke
        run: uv run pytest tests/live -m live -q

repos:
  - repo: local
    hooks:
      - id: check-import-graph
        name: check import graph
        entry: python scripts/check_import_graph.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: sync-version-badges
        name: sync version badges
        entry: python scripts/sync_version_badges.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: "(pyproject\\.toml|README.*\\.md)$"
      - id: sync-test-count
        name: sync test count
        entry: python scripts/sync_test_count.py --check
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: ruff
        name: ruff
        entry: ruff check
        language: system
        types: [python]
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        stages: [manual]

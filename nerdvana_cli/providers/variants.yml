# Provider variant metadata.
#
# Single source of truth for per-provider metadata that ``providers/base.py``
# exposes as PROVIDER_CAPABILITIES, DEFAULT_BASE_URLS, DEFAULT_MODELS, and
# PROVIDER_KEY_ENVVARS. Adding a new provider only requires:
#
#   1. Append a new ProviderName enum value in base.py.
#   2. Add a new entry below with the same key.
#   3. Wire the provider class in providers/factory.py:_PROVIDER_CLASSES.
#
# Each entry MUST include: base_url, default_model, env_vars (non-empty),
# capabilities (supports_tools, supports_streaming, supports_vision,
# supports_thinking, max_context). Missing fields fail loudly at import.

anthropic:
  base_url:      "https://api.anthropic.com"
  default_model: "claude-sonnet-4-20250514"
  env_vars:      ["ANTHROPIC_API_KEY"]
  capabilities:
    supports_tools:     true
    supports_streaming: true
    supports_vision:    true
    supports_thinking:  true
    max_context:        200000


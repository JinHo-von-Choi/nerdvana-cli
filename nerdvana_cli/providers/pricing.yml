# Provider/model pricing for USD cost estimation.
# Units: USD per 1,000 tokens (input_per_1k / output_per_1k).
# Each provider block carries a `# YYYY-MM-DD snapshot — <source URL>`
# comment at the top. Stale threshold defaults to 90 days, override via
# NERDVANA_PRICING_TTL_DAYS env var.
# Run `python scripts/check_pricing_freshness.py` to scan, then either:
# - `python scripts/update_pricing.py --provider <name>` (auto-fetch:
#   anthropic, openai, google; others fall back to manual)
# - manually edit against the source URL listed in the snapshot comment
# 0 + comment marks pricing that is non-public or pending official release.

